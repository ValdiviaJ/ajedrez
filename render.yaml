services:
  # ---------------------------------------------------------------------------
  # 1. Backend (Laravel API Web Service)
  # ---------------------------------------------------------------------------
  - type: web
    name: chess-neon-api
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile.render
    dockerContext: backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: chess-neon-api
          property: host
      - key: APP_KEY
        value: base64:5f86f3WDZpIL/ycTSOXhELW6kxdOJlNs65QKubkb0Ms=
      - key: SERVER_NAME
        value: "http://"
      - key: PORT
        value: 80
      
      # Conexión a Base de Datos Externa (Supabase / Neon)
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6543"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

      # Seguridad CORS - Permitirá peticiones desde tu frontend en Render y local
      - key: ALLOWED_ORIGINS
        value: https://chess-neon-frontend.onrender.com,http://localhost:3000,http://localhost:5173

  # ---------------------------------------------------------------------------
  # 2. Frontend (Static Site - React + Vite)
  # ---------------------------------------------------------------------------
  - type: web
    name: chess-neon-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # URL pública de la API en Render para el navegador del cliente
      - key: VITE_API_URL
        value: https://chess-neon-api.onrender.com/api/v1
    routes:
      # Regla para evitar errores 404 de React Router al recargar páginas secundarias
      - type: rewrite
        source: /*
        destination: /index.html
